<!DOCTYPE html>

<html>
<head>
    <title>Fashion MNIST Predictor</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
            padding: 40px;
        }

    .box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
        padding: 10px 20px;
        background: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #45a049;
    }

    h2 {
        margin-top: 20px;
    }
</style>

</head>
<body>


<div class="box">
   <!DOCTYPE html>

<html>
<head>
    <title>Fashion Predictor</title>
</head>
<body style="text-align:center; font-family:Arial;">

<!DOCTYPE html>

<html>
<head>
    <title>Fashion AI</title>
</head>
<body style="text-align:center; font-family:Arial;">


<h1>Upload Image to Predict</h1>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <br><br>
    <button type="submit">Predict</button>
</form>

{% if prediction %}
    <h2>Prediction: {{ prediction }}</h2>
{% endif %}


</body>
</html>

</body>
</html>


</body>
</html>
